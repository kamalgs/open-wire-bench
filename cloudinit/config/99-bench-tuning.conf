# /etc/sysctl.d/99-bench-tuning.conf
# Tuning for 100K+ TCP connections on a single bench node.
# Applied by cloudinit/scripts/bootstrap.sh via `sysctl --system` on boot.

# File descriptor ceiling (default 8k is way too low for 100K conns).
fs.file-max = 2097152
fs.nr_open  = 2097152

# Ephemeral port range (default 32768-60999 = ~28K ports; too small for
# 100K outbound connections even accounting for dest-port diversity).
net.ipv4.ip_local_port_range = 10000 65535

# Socket backlog on listen() — open-wire uses `listen(fd, 128)`; the
# kernel limit is max(backlog, somaxconn).
net.core.somaxconn       = 8192
net.ipv4.tcp_max_syn_backlog = 8192

# TIME_WAIT reuse speeds up test iteration when we churn many connections.
net.ipv4.tcp_tw_reuse    = 1

# Conntrack table for NAT gateways — we don't NAT inside VPC, but keep
# it generous in case the kernel still tracks.
net.netfilter.nf_conntrack_max = 1048576

# Socket buffer ceiling so per-connection autotuning can actually grow
# (~4MB per connection at 100K conns = 400GB — autotuning won't let it
# exceed this cap, so it's safe).
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
