global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    ec2_sd_configs:
      - region: us-east-1
        port: 9100
        filters:
          - name: tag:Project
            values: [open-wire-bench]
          - name: instance-state-name
            values: [running]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: env

  - job_name: open-wire
    ec2_sd_configs:
      - region: us-east-1
        port: 9101
        filters:
          - name: tag:Role
            values: [hub]
          - name: instance-state-name
            values: [running]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
